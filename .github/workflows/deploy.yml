name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Set lowercase Docker Username
      shell: bash
      run: |
        echo "DOCKER_USERNAME_LOWER=${DOCKER_USERNAME,,}" >> $GITHUB_ENV
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    - name: Pull latest Docker image
      run: docker pull ${{ env.DOCKER_USERNAME_LOWER }}/simple-web-service:latest

    - name: Stop existing container
      continue-on-error: true
      run: docker stop devops-app

    - name: Remove old container
      continue-on-error: true
      run: docker rm devops-app

    - name: Run new container
      run: docker run -d --name devops-app -p 3000:3000 ${{ env.DOCKER_USERNAME_LOWER }}/simple-web-service:latest